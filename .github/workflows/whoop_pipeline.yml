name: Whoop Daily Pipeline

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8 AM UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  pipeline:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      NEW_SNOWFLAKE_PRIVATE_KEY: ${{ secrets.NEW_SNOWFLAKE_PRIVATE_KEY }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
      WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
      WHOOP_ACCESS_TOKEN: ${{ secrets.WHOOP_ACCESS_TOKEN }}
      WHOOP_REFRESH_TOKEN: ${{ secrets.WHOOP_REFRESH_TOKEN }}
      WHOOP_REDIRECT_URI: ${{ secrets.WHOOP_REDIRECT_URI }}
      GH_PAT: ${{ secrets.WHOOP_PIPELINE_PAT }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-pipeline.txt

      - name: Extract Whoop data
        run: python run_pipeline.py

      - name: Run dbt deps
        working-directory: include/dbt
        run: dbt deps --profiles-dir . --project-dir .

      - name: Run dbt staging models
        working-directory: include/dbt
        run: dbt run --select tag:staging --profiles-dir . --project-dir .

      - name: Run dbt marts models
        working-directory: include/dbt
        run: dbt run --select tag:marts --profiles-dir . --project-dir .

      - name: Run dbt tests
        working-directory: include/dbt
        run: dbt test --profiles-dir . --project-dir .
